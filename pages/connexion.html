<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page de connexion</title>
    <link rel="stylesheet" href="./connexion.css" />
  </head>
  <body>
    <div class="form">
      <h1>Bienvenue chez nous</h1>
      <div class="content">
        <label for="name">Nom </label>
        <input type="text" id="name" placeholder="Entrer votre nom..." />
        <br />
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="......@...com" />
        <br />
        <label for="phone">Telephone</label>
        <input type="number" id="phone" placeholder="Numero de telephone" />
        <br />

        <!-- Boutons -->
        <div class="boutons">
          <button id="seConnecter">Se Connecter</button>
          <button id="inscription">Cree un compte</button>
        </div>
      </div>
    </div>

    <script src="../app.js"></script>
  </body>
</html>
